{% extends 'main.html' %}
{% load static %}

{% block title %}Add Test — Teacher Panel{% endblock %}

{% block top %}
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid ps-3 ps-md-5 pe-3 pe-md-5">
    <div class="fw-bold fs-3">Teacher Panel</div>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
        aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNavDropdown">
      <ul class="navbar-nav ms-auto mb-lg-2 px-4">
        <li class="nav-item me-3"><a class="nav-link active text-white fs-5" href="{% url 'OTS:teacher_dashboard' %}">Dashboard</a></li>
        <li class="nav-item me-3"><a class="nav-link active text-white fs-5" href="{% url 'OTS:Logout' %}">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>
{% endblock %}

{% block content %}
<div class="container py-3 py-md-4 px-2 px-sm-3" style="max-width: 760px;">
  <div class="card border-0 shadow-lg rounded-4" style="background:rgba(255,255,255,0.97);">
    <div class="card-body p-3 p-sm-4 p-md-5">
      <h3 class="fw-bold mb-3 text-dark">Add Test</h3>

      {% if message %}
      <div class="alert alert-{{ kind }}">{{ message }}</div>
      {% endif %}

      <form method="post" class="mt-3">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label fw-semibold">Subject</label>
          <select name="subject_id" class="form-select form-select-lg rounded-3" required>
            <option value="">— Select subject —</option>
            {% for s in subjects %}
              <option value="{{ s.id }}">{{ s.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Test name</label>
          <input name="name" class="form-control form-control-lg rounded-3"
                 placeholder="e.g. Unit Test 1" required>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Duration (Minutes)</label>
          <input type="number" name="duration" class="form-control form-control-lg rounded-3"
                 value="30" min="1" max="300" required>
        </div>

        <button type="submit"
                class="btn btn-dark btn-lg rounded-pill px-4 px-md-5 w-100 w-md-auto">
          Add Test
        </button>
      </form>
    </div>
  </div>
</div>

<style>
  @media (min-width: 768px) {
    .w-md-auto { width: auto !important; }
  }
</style>
{% endblock %}
