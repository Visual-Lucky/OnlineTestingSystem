{% extends 'main.html' %}
{% load static %}

{% block title %}Add Question — Teacher Panel{% endblock %}

{% block top %}
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid ps-3 ps-md-5 pe-3 pe-md-5">
    <div class="fw-bold fs-3">Teacher Panel</div>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
        aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNavDropdown">
      <ul class="navbar-nav ms-auto mb-lg-2 px-4">
        <li class="nav-item me-3"><a class="nav-link active text-white fs-5" href="{% url 'OTS:teacher_dashboard' %}">Dashboard</a></li>
        <li class="nav-item me-3"><a class="nav-link active text-white fs-5" href="{% url 'OTS:Logout' %}">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>
{% endblock %}

{% block content %}
<div class="container py-3 py-md-4 px-2 px-sm-3" style="max-width: 900px;">
  <div class="card border-0 shadow-lg rounded-4" style="background:rgba(255,255,255,0.97);">
    <div class="card-body p-3 p-sm-4 p-md-5">
      <h3 class="fw-bold mb-3 text-dark">Add Question</h3>

      {% if message %}
      <div class="alert alert-{{ kind }}">{{ message }}</div>
      {% endif %}

      <form method="post" class="mt-3">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label fw-semibold">Test</label>
          <select name="test_id" class="form-select form-select-lg rounded-3" required>
            <option value="">— Select test —</option>
            {% for t in tests %}
              <option value="{{ t.id }}">{{ t.subject.name }} — {{ t.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Question</label>
          <textarea name="que" class="form-control rounded-3" rows="3" required></textarea>
        </div>

        <div class="row g-2 g-md-3">
          <div class="col-12 col-md-6">
            <label class="form-label fw-semibold">Option A</label>
            <input name="a" class="form-control rounded-3" required>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label fw-semibold">Option B</label>
            <input name="b" class="form-control rounded-3" required>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label fw-semibold">Option C</label>
            <input name="c" class="form-control rounded-3" required>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label fw-semibold">Option D</label>
            <input name="d" class="form-control rounded-3" required>
          </div>
        </div>

        <div class="mt-3 mb-4">
          <label class="form-label fw-semibold">Answer</label>
          <select name="ans" class="form-select rounded-3" required>
            <option value="a">A</option>
            <option value="b">B</option>
            <option value="c">C</option>
            <option value="d">D</option>
          </select>
        </div>

        <button type="submit"
                class="btn btn-dark btn-lg rounded-pill px-4 px-md-5 w-100 w-md-auto">
          Add Question
        </button>
      </form>
    </div>
  </div>
</div>

<style>
  @media (min-width: 768px) {
    .w-md-auto { width: auto !important; }
  }
</style>
{% endblock %}
